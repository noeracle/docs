  </g>

  <!-- Hero text — Geist Bold sans (system fallback chain matches Geist proportions) -->
  <text x="72" y="320" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="700" font-size="80" fill="#f4f4ea" letter-spacing="-2.6">
