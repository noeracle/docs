    <text x="22" y="124" font-size="56" letter-spacing="-1.5" fill="#f4f4ea" font-weight="500">$77,034.92</text>

    <text x="22" y="174" font-size="10" letter-spacing="2.2" fill="rgba(255,255,255,0.35)">SIGNED</text>
    <text x="22" y="190" font-size="12" letter-spacing="0.5" fill="rgba(231,231,226,0.85)">2026-05-26 14:23:45 UTC</text>

